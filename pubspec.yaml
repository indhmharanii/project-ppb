name: project_final_ppb
description: "MediCare - Aplikasi Booking Klinik"

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.1
  shared_preferences: ^2.5.3
  flutter_svg: ^2.2.0
  iconsax: ^0.0.8
  lottie: ^3.3.2
  sqflite: ^2.3.3+1
  path: ^1.9.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/MediCare_logo.png"
  adaptive_icon_background: "#FFFFFF"

flutter:
  uses-material-design: true

  assets:
    - assets/images/